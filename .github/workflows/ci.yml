name: LibreReward Bridge CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

env:
  NODE_VERSION: 22.18.0

jobs:
  quality:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci --ignore-scripts
      - run: npm run format:check
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run examples:typecheck
      - run: npm run test:coverage
      - run: npm run openapi:validate | tee openapi-validation.txt
      - run: npm run docs:links
      - run: npm run check:artifacts
      - run: npm run build
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.0
        with:
          name: quality-evidence
          path: |
            coverage/coverage-summary.json
            coverage/index.html
            openapi-validation.txt
          if-no-files-found: error

  integration:
    runs-on: ubuntu-24.04
    services:
      postgres:
        image: postgres:17.10-bookworm
        env:
          POSTGRES_DB: libreward_test
          POSTGRES_USER: libreward
          POSTGRES_PASSWORD: test-only
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U libreward -d libreward_test"
          --health-interval 5s --health-timeout 3s --health-retries 20
    env:
      TEST_DATABASE_URL: postgres://libreward:test-only@127.0.0.1:5432/libreward_test
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci --ignore-scripts
      - run: npm run test:integration:required -- --reporter=verbose

  supply-chain:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci --ignore-scripts
      - run: npm audit --omit=dev --audit-level=high
      - run: npm run license:check
      - run: npm run sbom
      - run: npm pack --dry-run
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.0
        with:
          name: cyclonedx-sbom
          path: sbom.cdx.json
          if-no-files-found: error

  container:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - run: cp .env.example .env
      - run: docker compose config --quiet
      - run: docker compose up --detach --build --wait
      - run: curl --fail --silent --show-error http://127.0.0.1:8080/healthz
      - run: curl --fail --silent --show-error http://127.0.0.1:8080/readyz
      - if: always()
        run: docker compose logs --no-color
      - if: always()
        run: docker compose down --volumes

  secret-scan:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0
      - name: Scan repository history for secrets
        run: >-
          docker run --rm
          -e GIT_CONFIG_COUNT=1
          -e GIT_CONFIG_KEY_0=safe.directory
          -e GIT_CONFIG_VALUE_0=/repo
          -v "$PWD:/repo"
          zricethezav/gitleaks:v8.30.1
          git --redact=100 --log-opts=--all /repo
