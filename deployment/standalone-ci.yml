# Template mirror of the active standalone workflow in .github/workflows/ci.yml.
name: LibreReward Bridge CI

on:
  pull_request:
  push:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-24.04
    services:
      postgres:
        image: postgres:17.10-bookworm
        env:
          POSTGRES_DB: libreward_test
          POSTGRES_USER: libreward
          POSTGRES_PASSWORD: test-only
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U libreward -d libreward_test"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20
    env:
      LIBREREWARD_ENV: test
      DATABASE_URL: postgres://libreward:test-only@127.0.0.1:5432/libreward_test
      TEST_DATABASE_URL: postgres://libreward:test-only@127.0.0.1:5432/libreward_test
      API_KEY_HASH_SECRET: ci-api-key-hash-secret-32-bytes-minimum
      OPERATOR_API_KEY_HASH_SECRET: ci-operator-key-hash-secret-32-bytes-minimum
      CLAIM_TOKEN_HASH_SECRET: ci-claim-token-hash-secret-32-bytes-minimum
      DATA_ENCRYPTION_KEY: AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA
      PROVIDER: mock
      LOG_LEVEL: silent
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 22.18.0
          cache: npm
      - run: npm ci --ignore-scripts
      - run: npm run format:check
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run build
      - run: npm run migrate
      - run: npm run test:unit
      - run: npm run test:integration:required -- --reporter=verbose
      - run: npm run openapi:validate
      - run: npm audit --omit=dev --audit-level=high
      - run: npm run license:check
      - run: npm run sbom
      - uses: actions/upload-artifact@v7
        with:
          name: libreward-sbom
          path: sbom.cdx.json

  container:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7
      - run: cp .env.example .env
      - run: docker compose config --quiet
      - run: docker compose up --detach --build --wait
      - run: curl --fail --silent --show-error http://127.0.0.1:8080/healthz
      - run: curl --fail --silent --show-error http://127.0.0.1:8080/readyz
      - if: always()
        run: docker compose logs --no-color
      - if: always()
        run: docker compose down --volumes

  secret-scan:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Scan repository history for secrets
        run: >-
          docker run --rm
          -e GIT_CONFIG_COUNT=1
          -e GIT_CONFIG_KEY_0=safe.directory
          -e GIT_CONFIG_VALUE_0=/repo
          -v "$PWD:/repo"
          zricethezav/gitleaks:v8.30.1
          git --redact=100 --log-opts=--all /repo
